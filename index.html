  <script>
    (function allowOnlyApprovedEmbedders() {
      const redirectUrl = "https://hklifesim.online/";
      const allowedHosts = new Set(["hklifesim.online", "localhost"]);

      try {
        const parentUrl = new URL(document.referrer);
        if (window.top !== window.self && allowedHosts.has(parentUrl.hostname)) {
          document.documentElement.classList.add("is-embedded-frame");
          return;
        }
      } catch {
        // A missing or malformed referrer is not an approved embedding.
      }

      // GitHub Pages serves this project statically, so it cannot inspect the
      // Referer header. This is a browser-side fallback; server.mjs performs
      // the actual HTTP 301 when the project is served by Node.
      window.location.replace(redirectUrl);
    })();
  </script>

  <!-- Flutter Web Setup -->
  <script>
    const serviceWorkerVersion = "2026071101";
  </script>
  <script src="i18n-loader.js"></script>
  <script src="flutter.js" defer></script>

  <!-- Loading Screen Style -->
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans HK', sans-serif;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 9999;
      transition: opacity 0.4s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      font-size: 72px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #FBBF24;
      margin-bottom: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #FBBF24;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }

    .embedded-from {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 12;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.46);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .02em;
      line-height: 1;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.32);
    }

    .embedded-from img {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      opacity: .72;
    }

    .is-embedded-frame .embedded-from {
      display: flex;
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="logo">🎮</div>
    <div class="title">香港人生模擬器</div>
    <div class="subtitle">🇭🇰 Web Demo</div>
    <div class="spinner"></div>
    <div class="footer">首次載入需要 3-5 秒，請耐心等候</div>
  </div>
  <script>
    window.addEventListener('load', function (ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: { serviceWorkerVersion: serviceWorkerVersion },
        onEntrypointLoaded: async function (engineInitializer) {
          let appRunner = await engineInitializer.initializeEngine({
            canvasKitBaseUrl: "canvaskit/"
          });
          await appRunner.runApp();
          // Hide loading screen
          setTimeout(function () {
            document.getElementById('loading').classList.add('hidden');
            setTimeout(function () {
              document.getElementById('loading').remove();
            }, 500);
          }, 500);
        }
      });
    });
  </script>
</body>

</html>
